<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="">
  <rect width="512" height="512" fill="#2a1810" rx="112"/>
  <!-- Diagonal wire — beads sit exactly on the line y = 512 - x -->
  <line x1="64" y1="448" x2="448" y2="64" stroke="#b87333" stroke-width="28" stroke-linecap="round"/>
  <!-- Left small bead at (144, 368) -->
  <circle cx="144" cy="368" r="38" fill="#c9a06c"/>
  <circle cx="132" cy="356" r="11" fill="#f5ede3" opacity="0.38"/>
  <!-- Central large bead at (256, 256) -->
  <circle cx="256" cy="256" r="72" fill="#b87333"/>
  <circle cx="256" cy="256" r="72" fill="none" stroke="#e8d4bc" stroke-width="8"/>
  <!-- Gem facet cross-hairs -->
  <line x1="256" y1="184" x2="256" y2="328" stroke="#2a1810" stroke-width="4" opacity="0.25"/>
  <line x1="184" y1="256" x2="328" y2="256" stroke="#2a1810" stroke-width="4" opacity="0.25"/>
  <!-- Highlight -->
  <circle cx="228" cy="228" r="24" fill="#f5ede3" opacity="0.44"/>
  <!-- Right small bead at (368, 144) -->
  <circle cx="368" cy="144" r="38" fill="#c9a06c"/>
  <circle cx="356" cy="132" r="11" fill="#f5ede3" opacity="0.38"/>
</svg>
